<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>CaseLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #f5f0ea; --bg-card: #fff; --bg-input: #ece6dd;
      --text: #2a2520; --text-sec: #7a6f65; --text-ter: #b5aa9e;
      --primary: #b85c2f; --primary-hover: #9a4a20;
      --primary-light: rgba(184,92,47,0.10);
      --accent: #2d7a54; --accent-light: rgba(45,122,84,0.10);
      --danger: #c44040; --danger-light: rgba(196,64,64,0.08);
      --border: #e0d8ce;
      --shadow: 0 2px 14px rgba(42,37,32,0.06);
      --shadow-lg: 0 8px 32px rgba(42,37,32,0.12);
      --radius: 16px; --radius-sm: 10px;
      --nav-h: 64px; --header-h: 52px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    .dark {
      --bg: #0e0e16; --bg-card: #181822; --bg-input: #20202e;
      --text: #e6ded4; --text-sec: #908880; --text-ter: #585048;
      --primary: #d48548; --primary-hover: #e09558;
      --primary-light: rgba(212,133,72,0.12);
      --accent: #4cb880; --accent-light: rgba(76,184,128,0.12);
      --danger: #e06060; --danger-light: rgba(224,96,96,0.10);
      --border: #28283a;
      --shadow: 0 2px 14px rgba(0,0,0,0.22);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.35);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
    #app{height:100%;display:flex;flex-direction:column;max-width:520px;margin:0 auto;position:relative}

    /* Header */
    .app-header{height:var(--header-h);padding:0 20px;padding-top:var(--safe-t);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg);z-index:10}
    .app-header h1{font-family:'Fraunces',serif;font-size:21px;font-weight:900;color:var(--primary);letter-spacing:-0.5px}
    .header-date{font-size:12px;color:var(--text-sec);font-weight:500}

    /* Tabs */
    .tab-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    .tab-pane{display:none;padding:16px;padding-bottom:calc(90px + var(--safe-b));animation:fadeIn .25s ease}
    .tab-pane.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* Bottom Nav */
    .bottom-nav{display:flex;background:var(--bg-card);border-top:1px solid var(--border);padding-bottom:var(--safe-b);flex-shrink:0;z-index:20}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px 8px;border:none;background:none;color:var(--text-ter);font-size:10px;font-family:inherit;font-weight:600;cursor:pointer;transition:color .2s}
    .nav-item i{font-size:19px}
    .nav-item.active{color:var(--primary)}

    /* ===== COUNTER TAB ===== */
    .counter-date-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
    .counter-date-row button{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
    .counter-date-row button:hover{background:var(--primary-light)}
    .counter-date-input{font-family:inherit;font-size:16px;font-weight:600;padding:8px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg-input);color:var(--text);text-align:center;outline:none;width:auto;transition:border-color .2s}
    .counter-date-input:focus{border-color:var(--primary)}
    .today-pill{padding:6px 12px;border-radius:16px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;font-family:inherit;border:none;cursor:pointer;display:none;flex-shrink:0}
    .today-pill.show{display:inline-flex}

    .counter-hero{text-align:center;padding:24px 0 16px}
    .counter-input-wrap{position:relative;display:inline-block}
    .counter-input{font-family:'Fraunces',serif;font-size:88px;font-weight:900;color:var(--primary);line-height:1;text-align:center;background:transparent;border:2px solid transparent;border-radius:14px;outline:none;width:3ch;min-width:2ch;transition:border-color .2s,background .2s;-moz-appearance:textfield}
    .counter-input::-webkit-outer-spin-button,.counter-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .counter-input:focus{border-color:var(--primary);background:var(--primary-light)}
    .counter-label{font-size:13px;color:var(--text-sec);text-transform:uppercase;letter-spacing:3px;font-weight:600;margin-top:4px}
    .counter-label .counter-date-display{text-transform:none;letter-spacing:0;font-weight:500}

    .counter-controls{display:flex;justify-content:center;gap:40px;padding:4px 0 28px}
    .ctrl-btn{width:68px;height:68px;border-radius:50%;font-size:30px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s;border:none;font-family:inherit}
    .ctrl-btn:active{transform:scale(0.88)}
    .ctrl-minus{background:var(--bg-card);border:2px solid var(--border)!important;color:var(--text-sec)}
    .ctrl-minus:hover{color:var(--danger);border-color:var(--danger)!important}
    .ctrl-plus{background:var(--primary);color:#fff;box-shadow:0 4px 18px rgba(184,92,47,0.30)}
    .ctrl-plus:hover{background:var(--primary-hover)}

    .pop{animation:popBounce .3s ease}
    @keyframes popBounce{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
    .float-plus{position:fixed;font-family:'Fraunces',serif;font-size:26px;font-weight:900;color:var(--accent);pointer-events:none;z-index:200;animation:floatUp .8s ease forwards}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.15)}}

    /* Week summary */
    .week-section{background:var(--bg-card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
    .week-title{font-size:12px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
    .week-row{display:flex;align-items:center;padding:5px 4px;border-radius:8px;transition:background .2s}
    .week-row.is-selected{background:var(--primary-light)}
    .week-day{width:34px;font-size:11px;font-weight:700;color:var(--text-sec)}
    .week-date{width:28px;font-size:11px;color:var(--text-ter)}
    .week-bar-bg{flex:1;height:20px;background:var(--bg-input);border-radius:5px;overflow:hidden;margin:0 8px}
    .week-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-hover));border-radius:5px;transition:width .5s ease;min-width:0}
    .week-count{width:24px;text-align:right;font-size:12px;font-weight:700;color:var(--text);font-family:'Fraunces',serif}

    /* ===== RECORDS TAB ===== */
    .section-hdr{font-size:12px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
    .cat-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .cat-card{padding:10px 14px;border-radius:var(--radius-sm);background:var(--bg-card);border:2px solid transparent;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);transition:border-color .2s,background .2s;font-size:13px;font-weight:600}
    .cat-card:hover{border-color:var(--border)}
    .cat-card.selected{border-color:var(--primary);background:var(--primary-light)}
    .cat-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .cat-card-count{font-size:11px;color:var(--text-ter);font-weight:400;margin-left:2px}
    .add-cat-chip{padding:10px 14px;border-radius:var(--radius-sm);border:2px dashed var(--border);background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-ter);font-family:inherit;transition:border-color .2s,color .2s}
    .add-cat-chip:hover{border-color:var(--primary);color:var(--primary)}

    .records-panel{animation:fadeIn .25s ease}
    .rec-panel-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .rec-panel-title{font-size:16px;font-weight:700;flex:1;display:flex;align-items:center;gap:8px}
    .rec-panel-title .cat-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
    .rec-panel-actions button{background:none;border:none;color:var(--text-ter);font-size:14px;cursor:pointer;padding:6px 8px;border-radius:6px;transition:color .2s,background .2s}
    .rec-panel-actions button:hover{background:var(--bg-input);color:var(--text)}
    .rec-panel-actions .del:hover{color:var(--danger);background:var(--danger-light)}

    .range-row{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
    .range-row label{font-size:11px;font-weight:700;color:var(--text-ter);text-transform:uppercase;letter-spacing:.5px}
    .range-input{font-family:inherit;font-size:14px;padding:7px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-input);color:var(--text);outline:none;width:auto;flex:1;min-width:0;transition:border-color .2s}
    .range-input:focus{border-color:var(--primary)}
    .range-clear{padding:7px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-sec);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
    .range-clear:hover{border-color:var(--primary);color:var(--primary)}
    .rec-count-badge{font-size:12px;color:var(--text-ter);font-weight:400}

    .rec-card{background:var(--bg-card);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
    .rec-color-bar{width:3px;height:32px;border-radius:2px;flex-shrink:0}
    .rec-info{flex:1;min-width:0}
    .rec-num{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rec-meta{font-size:11px;color:var(--text-sec);margin-top:1px}
    .rec-note{font-size:11px;color:var(--text-ter);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rec-del{background:none;border:none;color:var(--text-ter);font-size:14px;cursor:pointer;padding:6px;border-radius:6px;transition:color .2s,background .2s;flex-shrink:0}
    .rec-del:hover{color:var(--danger);background:var(--danger-light)}

    .add-rec-btn{width:100%;padding:12px;border:2px dashed var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text-sec);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px;transition:border-color .2s,color .2s}
    .add-rec-btn:hover{border-color:var(--primary);color:var(--primary)}
    .add-rec-btn i{margin-right:4px}

    /* ===== ANALYTICS TAB ===== */
    .period-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
    .period-btn{padding:7px 13px;border-radius:18px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-sec);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
    .period-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .custom-range-an{display:none;gap:6px;align-items:center;margin-bottom:14px}
    .custom-range-an.show{display:flex}
    .custom-range-an input{flex:1;font-family:inherit;font-size:14px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-input);color:var(--text);outline:none}
    .custom-range-an span{color:var(--text-ter);font-size:12px}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .stat-card{background:var(--bg-card);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;box-shadow:var(--shadow)}
    .stat-value{font-family:'Fraunces',serif;font-size:26px;font-weight:900;color:var(--primary);line-height:1.1}
    .stat-label{font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:.7px;margin-top:3px;font-weight:600}
    .chart-card{background:var(--bg-card);border-radius:var(--radius);padding:16px 14px;margin-bottom:14px;box-shadow:var(--shadow)}
    .chart-card h3{font-size:13px;font-weight:700;margin-bottom:12px}
    .chart-wrap{position:relative;height:200px}

    .data-section{border-top:1px solid var(--border);padding-top:18px;margin-top:8px}
    .data-section h3{font-size:12px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
    .data-btns{display:flex;gap:8px}
    .data-btns button{flex:1;padding:10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
    .data-btns button:hover{border-color:var(--primary);color:var(--primary)}
    .data-btns button i{margin-right:5px}
    .hidden-file{display:none}

    /* ===== MODALS ===== */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.show{opacity:1;pointer-events:auto}
    .modal{background:var(--bg-card);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:var(--safe-b)}
    .modal-overlay.show .modal{transform:translateY(0)}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 0}
    .modal-header h2{font-family:'Fraunces',serif;font-size:18px;font-weight:700}
    .modal-close{background:none;border:none;color:var(--text-sec);font-size:16px;cursor:pointer;padding:6px;border-radius:50%}
    .modal-body{padding:16px 18px}
    .modal-footer{padding:0 18px 18px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:11px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
    .form-input{font-family:inherit;font-size:16px;padding:10px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg-input);color:var(--text);width:100%;outline:none;transition:border-color .2s}
    .form-input:focus{border-color:var(--primary)}
    textarea.form-input{resize:vertical;min-height:60px}
    .color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
    .color-swatch{width:100%;aspect-ratio:1;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
    .color-swatch:hover{transform:scale(1.12)}
    .color-swatch.selected{border-color:var(--text);transform:scale(1.12)}
    .btn{width:100%;padding:12px;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .2s,transform .1s}
    .btn:active{transform:scale(0.98)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-ghost{background:var(--bg-input);color:var(--text-sec)}
    .btn-danger{background:var(--danger);color:#fff}
    .confirm-body{padding:20px 18px 6px}
    .confirm-body p{font-size:14px;line-height:1.5}
    .confirm-footer{display:flex;gap:8px;padding:14px 18px 18px}
    .confirm-footer .btn{flex:1}

    /* Misc */
    .empty-state{text-align:center;padding:40px 16px;color:var(--text-ter)}
    .empty-state i{font-size:36px;margin-bottom:10px;display:block}
    .empty-state p{font-size:13px;line-height:1.5}
    .toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 20px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--bg);padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .storage-warn{background:var(--danger-light);color:var(--danger);padding:8px 14px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:12px;line-height:1.4}
    .storage-warn i{margin-right:5px}
    .tab-content::-webkit-scrollbar{width:0}
  </style>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>CaseLog</h1>
      <span class="header-date" id="headerDate"></span>
    </header>

    <main class="tab-content">
      <!-- COUNTER -->
      <div id="tab-counter" class="tab-pane active">
        <div id="storageWarn"></div>
        <div class="counter-date-row">
          <button id="cPrev"><i class="fas fa-chevron-left"></i></button>
          <input type="date" class="counter-date-input" id="cDate">
          <button id="cNext"><i class="fas fa-chevron-right"></i></button>
          <button class="today-pill" id="cToday">Today</button>
        </div>
        <div class="counter-hero">
          <div class="counter-input-wrap">
            <input type="number" class="counter-input" id="cInput" value="0" min="0">
          </div>
          <div class="counter-label">cases <span class="counter-date-display" id="cLabel"></span></div>
        </div>
        <div class="counter-controls">
          <button class="ctrl-btn ctrl-minus" id="cMinus"><i class="fas fa-minus"></i></button>
          <button class="ctrl-btn ctrl-plus" id="cPlus"><i class="fas fa-plus"></i></button>
        </div>
        <div class="week-section">
          <div class="week-title" id="weekTitle">This Week</div>
          <div id="weekRows"></div>
        </div>
      </div>

      <!-- RECORDS -->
      <div id="tab-records" class="tab-pane">
        <div class="section-hdr">Categories</div>
        <div class="cat-grid" id="catGrid"></div>
        <div id="recPanel"></div>
      </div>

      <!-- ANALYTICS -->
      <div id="tab-analytics" class="tab-pane">
        <div class="period-selector" id="periodSel"></div>
        <div class="custom-range-an" id="customRange">
          <input type="date" id="anStart">
          <span>to</span>
          <input type="date" id="anEnd">
        </div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="chart-card">
          <h3>Daily Cases</h3>
          <div class="chart-wrap"><canvas id="dailyChart"></canvas></div>
        </div>
        <div class="data-section">
          <h3>Data Management</h3>
          <div class="data-btns">
            <button id="exportBtn"><i class="fas fa-download"></i> Export</button>
            <button id="importBtn"><i class="fas fa-upload"></i> Import</button>
          </div>
          <input type="file" id="importFile" accept=".json" class="hidden-file">
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="counter"><i class="fas fa-calculator"></i><span>Counter</span></button>
      <button class="nav-item" data-tab="records"><i class="fas fa-clipboard-list"></i><span>Records</span></button>
      <button class="nav-item" data-tab="analytics"><i class="fas fa-chart-bar"></i><span>Analytics</span></button>
    </nav>
  </div>

  <!-- Add Record Modal -->
  <div id="recModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Record</h2>
        <button class="modal-close" data-modal="recModal"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Case Number / Reference</label>
          <input type="text" class="form-input" id="recNumInput" placeholder="e.g. OP-2026-031">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" class="form-input" id="recDateInput">
        </div>
        <div class="form-group">
          <label>Note (optional)</label>
          <textarea class="form-input" id="recNoteInput" placeholder="Brief details..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="saveRecBtn">Save Record</button>
      </div>
    </div>
  </div>

  <!-- Category Modal -->
  <div id="catModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="catModalTitle">Add Category</h2>
        <button class="modal-close" data-modal="catModal"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Category Name</label>
          <input type="text" class="form-input" id="catNameInput" placeholder="e.g. Surgery">
        </div>
        <div class="form-group">
          <label>Color</label>
          <div class="color-grid" id="colorGrid"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="saveCatBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Confirm -->
  <div id="confirmModal" class="modal-overlay">
    <div class="modal" style="border-radius:var(--radius)">
      <div class="confirm-body"><p id="confirmMsg"></p></div>
      <div class="confirm-footer">
        <button class="btn btn-ghost" id="confirmNo">Cancel</button>
        <button class="btn btn-danger" id="confirmYes">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /* ===== DARK MODE ===== */
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      e.matches ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
    });

    /* ===== CONSTANTS ===== */
    const COLORS = ['#e05252','#e07840','#e0a830','#68b845','#2daa6e','#30a8c0','#4878d0','#7050d0','#a848c0','#d050a0','#78909c','#8d6e63'];
    const PERIODS = [
      { key: 'week', label: 'This Week' },
      { key: 'month', label: 'This Month' },
      { key: '30days', label: 'Last 30d' },
      { key: 'year', label: 'This Year' },
      { key: 'custom', label: 'Custom' }
    ];
    const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    /* ===== FIREBASE ===== */
    let firestore = null;
    let usingMemory = false;
    const mem = { dailyCounts: [], records: [], categories: [], nextId: 1 };

    const firebaseConfig = {
      apiKey: "AIzaSyDXx-Scqt_y8swNOqqIEq-MwInE0gMxfx8",
      authDomain: "tmh-case.firebaseapp.com",
      projectId: "tmh-case",
      storageBucket: "tmh-case.firebasestorage.app",
      messagingSenderId: "461118243183",
      appId: "1:461118243183:web:eb65e167783233c344e89a"
    };

    try {
      firebase.initializeApp(firebaseConfig);
      firestore = firebase.firestore();
    } catch (_e) {
      usingMemory = true;
    }

    /* ===== DATABASE (Firestore) ===== */

    /* Daily Counts */
    async function getCount(date) {
      if (usingMemory) { const e = mem.dailyCounts.find(c => c.date === date); return e ? e.count : 0; }
      const snap = await firestore.collection('dailyCounts').doc(date).get();
      return snap.exists ? snap.data().count : 0;
    }
    async function setCount(date, count) {
      if (usingMemory) {
        mem.dailyCounts = mem.dailyCounts.filter(c => c.date !== date);
        if (count > 0) mem.dailyCounts.push({ date, count });
        return;
      }
      if (count <= 0) {
        try { await firestore.collection('dailyCounts').doc(date).delete(); } catch (_e) { /* ignore */ }
      } else {
        await firestore.collection('dailyCounts').doc(date).set({ date, count });
      }
    }
    async function getCountsRange(start, end) {
      if (usingMemory) return mem.dailyCounts.filter(c => c.date >= start && c.date <= end);
      const snap = await firestore.collection('dailyCounts')
        .where('date', '>=', start).where('date', '<=', end).get();
      return snap.docs.map(d => d.data());
    }
    async function getAllCounts() {
      if (usingMemory) return [...mem.dailyCounts];
      const snap = await firestore.collection('dailyCounts').get();
      return snap.docs.map(d => d.data());
    }

    /* Records */
    async function addRecord(rec) {
      if (usingMemory) { rec.id = String(mem.nextId++); mem.records.push(rec); return rec.id; }
      const ref = await firestore.collection('records').add(rec);
      return ref.id;
    }
    async function deleteRecord(id) {
      if (usingMemory) { mem.records = mem.records.filter(r => r.id !== id); return; }
      await firestore.collection('records').doc(id).delete();
    }
    async function getRecordsByCat(cat, startD, endD) {
      let all;
      if (usingMemory) {
        all = mem.records.filter(r => r.category === cat);
      } else {
        const snap = await firestore.collection('records').where('category', '==', cat).get();
        all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }
      if (startD) all = all.filter(r => r.date >= startD);
      if (endD) all = all.filter(r => r.date <= endD);
      return all.sort((a, b) => b.date.localeCompare(a.date));
    }
    async function countRecordsByCat(cat) {
      if (usingMemory) return mem.records.filter(r => r.category === cat).length;
      const snap = await firestore.collection('records').where('category', '==', cat).get();
      return snap.size;
    }
    async function getAllRecords() {
      if (usingMemory) return [...mem.records];
      const snap = await firestore.collection('records').get();
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }
    async function deleteRecordsByCat(cat) {
      if (usingMemory) { mem.records = mem.records.filter(r => r.category !== cat); return; }
      const snap = await firestore.collection('records').where('category', '==', cat).get();
      for (const d of snap.docs) await d.ref.delete();
    }

    /* Categories */
    async function getCategories() {
      if (usingMemory) return [...mem.categories];
      const snap = await firestore.collection('categories').orderBy('name').get();
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }
    async function addCategory(cat) {
      if (usingMemory) { cat.id = String(mem.nextId++); mem.categories.push(cat); return cat.id; }
      const ref = await firestore.collection('categories').add({ name: cat.name, color: cat.color });
      return ref.id;
    }
    async function updateCategory(cat) {
      if (usingMemory) { const i = mem.categories.findIndex(c => c.id === cat.id); if (i >= 0) mem.categories[i] = cat; return; }
      await firestore.collection('categories').doc(cat.id).set({ name: cat.name, color: cat.color });
    }
    async function deleteCategoryDB(id) {
      if (usingMemory) { mem.categories = mem.categories.filter(c => c.id !== id); return; }
      await firestore.collection('categories').doc(id).delete();
    }
    async function clearAllData() {
      if (usingMemory) { mem.dailyCounts = []; mem.records = []; mem.categories = []; return; }
      for (const col of ['dailyCounts', 'records', 'categories']) {
        const snap = await firestore.collection(col).get();
        for (const d of snap.docs) await d.ref.delete();
      }
    }

    /* ===== STATE ===== */
    let categories = [];
    let currentTab = 'counter';
    let counterDate = todayStr();
    let selectedPeriod = 'week';
    let selectedCatId = null;
    let editingCatId = null;
    let selectedCatColor = COLORS[0];
    let recFilterFrom = '';
    let recFilterTo = '';
    let dailyChartInst = null;
    let confirmResolve = null;

    /* ===== DATE HELPERS ===== */
    function todayStr() { return new Date().toISOString().split('T')[0]; }
    function fmtDate(d) { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }); }
    function fmtShort(d) { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
    function addDays(d, n) { const dt = new Date(d + 'T12:00:00'); dt.setDate(dt.getDate() + n); return dt.toISOString().split('T')[0]; }
    function getWeekStart(d) { const dow = new Date(d + 'T12:00:00').getDay(); return addDays(d, -(dow === 0 ? 6 : dow - 1)); }
    function daysBetween(s, e) { const a = []; let c = s; while (c <= e) { a.push(c); c = addDays(c, 1); } return a; }
    function getRange(p) {
      const t = todayStr();
      switch (p) {
        case 'week': return { start: getWeekStart(t), end: addDays(getWeekStart(t), 6) };
        case 'month': return { start: t.slice(0, 8) + '01', end: t };
        case '30days': return { start: addDays(t, -29), end: t };
        case 'year': return { start: t.slice(0, 5) + '01-01', end: t };
        default: return { start: t, end: t };
      }
    }

    /* ===== UTILS ===== */
    function $(id) { return document.getElementById(id); }
    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function showToast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
    function showModal(id) { $(id).classList.add('show'); }
    function hideModal(id) { $(id).classList.remove('show'); }
    function showConfirm(msg) {
      return new Promise(resolve => {
        $('confirmMsg').textContent = msg;
        showModal('confirmModal');
        confirmResolve = resolve;
      });
    }
    function floatPlus(x, y, text) {
      const el = document.createElement('div');
      el.className = 'float-plus';
      el.textContent = text;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 800);
    }

    /* ===== NAVIGATION ===== */
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      $('tab-' + tab).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.tab === tab));
      if (tab === 'counter') renderCounter();
      else if (tab === 'records') renderRecordsTab();
      else if (tab === 'analytics') renderAnalytics();
    }

    /* ================================================================
       COUNTER TAB
       ================================================================ */
    async function renderCounter() {
      const count = await getCount(counterDate);
      const input = $('cInput');
      input.value = count;
      updateInputWidth();

      const isToday = counterDate === todayStr();
      $('cToday').classList.toggle('show', !isToday);
      $('cLabel').textContent = isToday ? 'today' : 'on ' + fmtShort(counterDate);

      await renderWeekSummary();
    }

    function updateInputWidth() {
      const input = $('cInput');
      const len = Math.max(1, String(input.value).length);
      input.style.width = Math.max(2, len + 0.6) + 'ch';
    }

    async function adjustCount(delta) {
      const cur = await getCount(counterDate);
      const next = Math.max(0, cur + delta);
      await setCount(counterDate, next);
      $('cInput').value = next;
      updateInputWidth();

      // Animate
      const input = $('cInput');
      input.classList.remove('pop');
      void input.offsetWidth;
      input.classList.add('pop');

      if (delta > 0) {
        const rect = input.getBoundingClientRect();
        floatPlus(rect.right + 2, rect.top, '+1');
      }
      await renderWeekSummary();
    }

    async function setCountFromInput() {
      const val = Math.max(0, parseInt($('cInput').value) || 0);
      $('cInput').value = val;
      updateInputWidth();
      await setCount(counterDate, val);
      await renderWeekSummary();
    }

    async function renderWeekSummary() {
      const ws = getWeekStart(counterDate);
      const days = [];
      for (let i = 0; i < 7; i++) days.push(addDays(ws, i));

      const counts = await getCountsRange(ws, addDays(ws, 6));
      const countMap = {};
      counts.forEach(c => { countMap[c.date] = c.count; });
      const maxC = Math.max(1, ...Object.values(countMap));

      const t = todayStr();
      $('weekTitle').textContent = ws === getWeekStart(t) ? 'This Week' : 'Week of ' + fmtShort(ws);

      $('weekRows').innerHTML = days.map((d, i) => {
        const cnt = countMap[d] || 0;
        const pct = maxC > 0 ? (cnt / maxC * 100) : 0;
        const isSel = d === counterDate;
        const dayNum = d.split('-')[2];
        return `<div class="week-row ${isSel ? 'is-selected' : ''}">
          <span class="week-day">${DAY_NAMES[i]}</span>
          <span class="week-date">${dayNum}</span>
          <div class="week-bar-bg"><div class="week-bar" style="width:${pct}%"></div></div>
          <span class="week-count">${cnt || '\u2013'}</span>
        </div>`;
      }).join('');
    }

    /* ================================================================
       RECORDS TAB
       ================================================================ */
    async function renderRecordsTab() {
      categories = await getCategories();
      const grid = $('catGrid');

      // Build category cards
      let html = '';
      for (const c of categories) {
        const cnt = await countRecordsByCat(c.name);
        const sel = selectedCatId === c.id ? 'selected' : '';
        html += `<div class="cat-card ${sel}" data-id="${c.id}">
          <span class="cat-card-dot" style="background:${c.color}"></span>
          ${escHtml(c.name)}<span class="cat-card-count">${cnt}</span>
        </div>`;
      }
      html += '<button class="add-cat-chip" id="addCatChip"><i class="fas fa-plus"></i> Add</button>';
      grid.innerHTML = html;

      // Bind category card clicks
      grid.querySelectorAll('.cat-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id;
          selectedCatId = selectedCatId === id ? null : id;
          renderRecordsTab();
        });
      });
      const addBtn = $('addCatChip');
      if (addBtn) addBtn.addEventListener('click', showAddCategoryModal);

      // Records panel
      const panel = $('recPanel');
      if (!selectedCatId) {
        panel.innerHTML = categories.length === 0
          ? '<div class="empty-state"><i class="fas fa-tags"></i><p>Create categories to start<br>recording cases.</p></div>'
          : '<div class="empty-state"><i class="fas fa-hand-pointer"></i><p>Select a category above<br>to view its records.</p></div>';
        return;
      }

      const cat = categories.find(c => c.id === selectedCatId);
      if (!cat) { panel.innerHTML = ''; return; }
      const recs = await getRecordsByCat(cat.name, recFilterFrom || null, recFilterTo || null);

      panel.innerHTML = `
        <div class="records-panel">
          <div class="rec-panel-header">
            <div class="rec-panel-title">
              <span class="cat-dot" style="background:${cat.color}"></span>
              ${escHtml(cat.name)}
              <span class="rec-count-badge">(${recs.length} record${recs.length !== 1 ? 's' : ''})</span>
            </div>
            <div class="rec-panel-actions">
              <button id="editCatBtn" title="Edit category"><i class="fas fa-pen"></i></button>
              <button id="delCatBtn" class="del" title="Delete category"><i class="fas fa-trash-alt"></i></button>
            </div>
          </div>
          <div class="range-row">
            <label>From</label>
            <input type="date" class="range-input" id="rFrom" value="${recFilterFrom}">
            <label>To</label>
            <input type="date" class="range-input" id="rTo" value="${recFilterTo}">
            <button class="range-clear" id="rClear">All</button>
          </div>
          <div id="recList">${recs.length === 0
            ? '<div class="empty-state" style="padding:24px 0"><i class="fas fa-folder-open"></i><p>No records yet' + (recFilterFrom || recFilterTo ? ' in this range' : '') + '.</p></div>'
            : recs.map(r => recCardHTML(r, cat.color)).join('')
          }</div>
          <button class="add-rec-btn" id="addRecBtn"><i class="fas fa-plus"></i> Add Record</button>
        </div>`;

      // Bind panel events
      $('editCatBtn').addEventListener('click', () => editCategoryModal(cat));
      $('delCatBtn').addEventListener('click', () => deleteCategoryPrompt(cat));
      $('rFrom').addEventListener('change', e => { recFilterFrom = e.target.value; renderRecordsTab(); });
      $('rTo').addEventListener('change', e => { recFilterTo = e.target.value; renderRecordsTab(); });
      $('rClear').addEventListener('click', () => { recFilterFrom = ''; recFilterTo = ''; renderRecordsTab(); });
      $('addRecBtn').addEventListener('click', showAddRecordModal);

      // Bind delete buttons on record cards
      $('recList').querySelectorAll('.rec-del').forEach(btn => {
        btn.addEventListener('click', async () => {
          const ok = await showConfirm('Remove this record?');
          if (!ok) return;
          await deleteRecord(btn.dataset.id);
          showToast('Record removed');
          renderRecordsTab();
        });
      });
    }

    function recCardHTML(r, color) {
      return `<div class="rec-card">
        <div class="rec-color-bar" style="background:${color}"></div>
        <div class="rec-info">
          <div class="rec-num">${escHtml(r.caseNum || '(no reference)')}</div>
          <div class="rec-meta">${fmtShort(r.date)}</div>
          ${r.note ? '<div class="rec-note">' + escHtml(r.note) + '</div>' : ''}
        </div>
        <button class="rec-del" data-id="${r.id}" title="Delete"><i class="fas fa-trash-alt"></i></button>
      </div>`;
    }

    /* ===== RECORD MODAL ===== */
    function showAddRecordModal() {
      $('recNumInput').value = '';
      $('recDateInput').value = todayStr();
      $('recNoteInput').value = '';
      showModal('recModal');
      setTimeout(() => $('recNumInput').focus(), 300);
    }

    async function saveRecord() {
      const cat = categories.find(c => c.id === selectedCatId);
      if (!cat) return;
      const caseNum = $('recNumInput').value.trim();
      const date = $('recDateInput').value || todayStr();
      const note = $('recNoteInput').value.trim();
      await addRecord({ caseNum, category: cat.name, date, note, createdAt: new Date().toISOString() });
      hideModal('recModal');
      showToast('Record saved');
      renderRecordsTab();
    }

    /* ===== CATEGORY MODAL ===== */
    function showAddCategoryModal() {
      editingCatId = null;
      $('catModalTitle').textContent = 'Add Category';
      $('catNameInput').value = '';
      selectedCatColor = COLORS[0];
      renderColorGrid();
      showModal('catModal');
      setTimeout(() => $('catNameInput').focus(), 300);
    }

    function editCategoryModal(cat) {
      editingCatId = cat.id;
      $('catModalTitle').textContent = 'Edit Category';
      $('catNameInput').value = cat.name;
      selectedCatColor = cat.color;
      renderColorGrid();
      showModal('catModal');
    }

    function renderColorGrid() {
      const grid = $('colorGrid');
      grid.innerHTML = COLORS.map(c =>
        `<div class="color-swatch ${c === selectedCatColor ? 'selected' : ''}" style="background:${c}" data-color="${c}"></div>`
      ).join('');
      grid.querySelectorAll('.color-swatch').forEach(sw => {
        sw.addEventListener('click', () => { selectedCatColor = sw.dataset.color; renderColorGrid(); });
      });
    }

    async function saveCategory() {
      const name = $('catNameInput').value.trim();
      if (!name) { showToast('Please enter a name'); return; }
      const dup = categories.find(c => c.name.toLowerCase() === name.toLowerCase() && c.id !== editingCatId);
      if (dup) { showToast('Category already exists'); return; }
      if (editingCatId) {
        const old = categories.find(c => c.id === editingCatId);
        if (old && old.name !== name) {
          // Update records with old category name
          const recs = await getRecordsByCat(old.name);
          for (const r of recs) {
            if (!usingMemory) {
              await firestore.collection('records').doc(r.id).update({ category: name });
            } else {
              const idx = mem.records.findIndex(mr => mr.id === r.id);
              if (idx >= 0) mem.records[idx].category = name;
            }
          }
        }
        await updateCategory({ id: editingCatId, name, color: selectedCatColor });
      } else {
        await addCategory({ name, color: selectedCatColor });
      }
      hideModal('catModal');
      categories = await getCategories();
      showToast(editingCatId ? 'Category updated' : 'Category created');
      renderRecordsTab();
    }

    async function deleteCategoryPrompt(cat) {
      const cnt = await countRecordsByCat(cat.name);
      const msg = cnt > 0
        ? `Delete "${cat.name}" and its ${cnt} record${cnt !== 1 ? 's' : ''}?`
        : `Delete category "${cat.name}"?`;
      const ok = await showConfirm(msg);
      if (!ok) return;
      await deleteRecordsByCat(cat.name);
      await deleteCategoryDB(cat.id);
      selectedCatId = null;
      categories = await getCategories();
      showToast('Category deleted');
      renderRecordsTab();
    }

    /* ================================================================
       ANALYTICS TAB
       ================================================================ */
    async function renderAnalytics() {
      let range;
      if (selectedPeriod === 'custom') {
        range = { start: $('anStart').value || todayStr(), end: $('anEnd').value || todayStr() };
      } else {
        range = getRange(selectedPeriod);
      }
      const counts = await getCountsRange(range.start, range.end);
      const countMap = {};
      counts.forEach(c => { countMap[c.date] = c.count; });

      const days = daysBetween(range.start, range.end);
      const total = counts.reduce((s, c) => s + c.count, 0);
      const avg = days.length > 0 ? (total / days.length).toFixed(1) : '0';
      let peakMax = 0;
      let peakDay = '-';
      counts.forEach(c => { if (c.count > peakMax) { peakMax = c.count; peakDay = fmtShort(c.date); } });

      $('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-value">${avg}</div><div class="stat-label">Daily Avg</div></div>
        <div class="stat-card"><div class="stat-value">${peakMax || 0}</div><div class="stat-label">Peak (${peakDay})</div></div>`;

      const labels = days.map(d => fmtShort(d));
      const data = days.map(d => countMap[d] || 0);
      renderDailyChart(labels, data);
    }

    function getChartColors() {
      const dk = document.documentElement.classList.contains('dark');
      return { text: dk ? '#908880' : '#7a6f65', grid: dk ? '#28283a' : '#e0d8ce', primary: dk ? '#d48548' : '#b85c2f', bg: dk ? 'rgba(212,133,72,0.25)' : 'rgba(184,92,47,0.18)' };
    }

    function renderDailyChart(labels, data) {
      const c = getChartColors();
      if (dailyChartInst) dailyChartInst.destroy();
      dailyChartInst = new Chart($('dailyChart'), {
        type: 'bar',
        data: { labels, datasets: [{ data, backgroundColor: c.bg, borderColor: c.primary, borderWidth: 2, borderRadius: 5, maxBarThickness: 28 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1, color: c.text, font: { family: "'DM Sans'" } }, grid: { color: c.grid } },
            x: { grid: { display: false }, ticks: { color: c.text, maxTicksLimit: 8, maxRotation: 0, font: { size: 10, family: "'DM Sans'" } } }
          }
        }
      });
    }

    function renderPeriodSelector() {
      $('periodSel').innerHTML = PERIODS.map(p =>
        `<button class="period-btn ${p.key === selectedPeriod ? 'active' : ''}" data-period="${p.key}">${p.label}</button>`
      ).join('');
    }

    /* ===== EXPORT / IMPORT ===== */
    async function exportData() {
      const payload = {
        version: 2,
        exportDate: new Date().toISOString(),
        dailyCounts: await getAllCounts(),
        records: await getAllRecords(),
        categories: await getCategories()
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'caselog-' + todayStr() + '.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Data exported');
    }

    async function importData(file) {
      try {
        const data = JSON.parse(await file.text());
        if (!data.dailyCounts && !data.records && !data.categories) { showToast('Invalid file'); return; }
        const ok = await showConfirm('Replace all current data with imported data?');
        if (!ok) return;
        await clearAllData();
        if (data.categories) for (const c of data.categories) await addCategory({ name: c.name, color: c.color });
        if (data.dailyCounts) for (const c of data.dailyCounts) await setCount(c.date, c.count);
        if (data.records) for (const r of data.records) await addRecord({ caseNum: r.caseNum, category: r.category, date: r.date, note: r.note, createdAt: r.createdAt });
        categories = await getCategories();
        showToast('Imported successfully');
        switchTab(currentTab);
      } catch (_e) { showToast('Import failed: invalid file'); }
    }

    /* ===== EVENT LISTENERS (attach immediately) ===== */
    // Nav
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // Counter date nav
    $('cPrev').addEventListener('click', () => { counterDate = addDays(counterDate, -1); $('cDate').value = counterDate; renderCounter(); });
    $('cNext').addEventListener('click', () => { counterDate = addDays(counterDate, 1); $('cDate').value = counterDate; renderCounter(); });
    $('cDate').addEventListener('change', () => { counterDate = $('cDate').value || todayStr(); renderCounter(); });
    $('cToday').addEventListener('click', () => { counterDate = todayStr(); $('cDate').value = counterDate; renderCounter(); });

    // Counter +/-
    $('cPlus').addEventListener('click', () => adjustCount(1));
    $('cMinus').addEventListener('click', () => adjustCount(-1));
    $('cInput').addEventListener('change', setCountFromInput);
    $('cInput').addEventListener('input', updateInputWidth);
    $('cInput').addEventListener('focus', () => $('cInput').select());

    // Period selector
    $('periodSel').addEventListener('click', e => {
      const btn = e.target.closest('.period-btn');
      if (!btn) return;
      selectedPeriod = btn.dataset.period;
      renderPeriodSelector();
      const cr = $('customRange');
      if (selectedPeriod === 'custom') { cr.classList.add('show'); }
      else { cr.classList.remove('show'); renderAnalytics(); }
    });
    $('anStart').addEventListener('change', () => { if (selectedPeriod === 'custom') renderAnalytics(); });
    $('anEnd').addEventListener('change', () => { if (selectedPeriod === 'custom') renderAnalytics(); });

    // Save record
    $('saveRecBtn').addEventListener('click', saveRecord);

    // Save category
    $('saveCatBtn').addEventListener('click', saveCategory);

    // Modal closes
    document.querySelectorAll('.modal-close').forEach(btn => {
      btn.addEventListener('click', () => hideModal(btn.dataset.modal));
    });
    document.querySelectorAll('.modal-overlay').forEach(ov => {
      ov.addEventListener('click', e => { if (e.target === ov) hideModal(ov.id); });
    });

    // Confirm
    $('confirmYes').addEventListener('click', () => { hideModal('confirmModal'); if (confirmResolve) confirmResolve(true); });
    $('confirmNo').addEventListener('click', () => { hideModal('confirmModal'); if (confirmResolve) confirmResolve(false); });

    // Export / Import
    $('exportBtn').addEventListener('click', exportData);
    $('importBtn').addEventListener('click', () => $('importFile').click());
    $('importFile').addEventListener('change', e => { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; });

    /* ===== INIT (async data loading) ===== */
    async function init() {
      // Set up UI defaults immediately
      $('headerDate').textContent = fmtDate(todayStr());
      $('cDate').value = counterDate;
      const r = getRange('week');
      $('anStart').value = r.start;
      $('anEnd').value = r.end;
      renderPeriodSelector();
      updateInputWidth();

      // Connect to Firestore (with timeout fallback)
      if (firestore) {
        try { await firestore.enablePersistence(); } catch (_e) { /* offline cache may not work */ }
        try {
          // Test connection with a 5-second timeout
          const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000));
          await Promise.race([getCategories(), timeout]);
        } catch (_e) {
          // Firestore not responding — fall back to memory
          usingMemory = true;
          firestore = null;
        }
      }

      if (!firestore) {
        usingMemory = true;
        $('storageWarn').innerHTML = '<div class="storage-warn"><i class="fas fa-exclamation-triangle"></i> Firebase unavailable. Data will be lost on refresh. Use Export to save.</div>';
      }

      // Load data and render
      try {
        categories = await getCategories();
      } catch (_e) {
        categories = [];
      }
      renderCounter();
    }

    init();
  </script>
</body>
</html>
