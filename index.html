<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Jeff's Dietetic Case Record</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
  <style>
    :root {
      --bg: #f5f0ea; --bg-card: #fff; --bg-input: #ece6dd;
      --text: #2a2520; --text-sec: #7a6f65; --text-ter: #b5aa9e;
      --primary: #b85c2f; --primary-hover: #9a4a20;
      --primary-light: rgba(184,92,47,0.10);
      --accent: #2d7a54; --accent-light: rgba(45,122,84,0.10);
      --danger: #c44040; --danger-light: rgba(196,64,64,0.08);
      --border: #e0d8ce;
      --shadow: 0 2px 14px rgba(42,37,32,0.06);
      --shadow-lg: 0 8px 32px rgba(42,37,32,0.12);
      --radius: 16px; --radius-sm: 10px;
      --nav-h: 56px; --header-h: 64px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    .dark {
      --bg: #0e0e16; --bg-card: #181822; --bg-input: #20202e;
      --text: #e6ded4; --text-sec: #908880; --text-ter: #585048;
      --primary: #d48548; --primary-hover: #e09558;
      --primary-light: rgba(212,133,72,0.12);
      --accent: #4cb880; --accent-light: rgba(76,184,128,0.12);
      --danger: #e06060; --danger-light: rgba(224,96,96,0.10);
      --border: #28283a;
      --shadow: 0 2px 14px rgba(0,0,0,0.22);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.35);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
    #app{height:100%;display:flex;flex-direction:column;max-width:520px;margin:0 auto;position:relative}

    /* Login */
    .login-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;padding:32px;text-align:center}
    .login-screen.hidden{display:none}
    .login-logo{font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:var(--primary);margin-bottom:6px;line-height:1.2}
    .login-sub{font-size:14px;color:var(--text-sec);margin-bottom:40px}
    .google-btn{display:inline-flex;align-items:center;gap:12px;padding:14px 28px;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg-card);color:var(--text);font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:var(--shadow);transition:all .2s}
    .google-btn:hover{border-color:var(--primary);box-shadow:var(--shadow-lg)}
    .google-btn:active{transform:scale(0.97)}
    .google-btn svg{width:22px;height:22px;flex-shrink:0}
    .login-error{margin-top:18px;padding:10px 16px;border-radius:var(--radius-sm);background:var(--danger-light);color:var(--danger);font-size:13px;max-width:340px;display:none;line-height:1.4}
    .login-error.show{display:block}
    .login-loading{margin-top:18px;font-size:13px;color:var(--text-sec);display:none}
    .login-loading.show{display:block}
    .login-loading i{margin-right:6px;animation:spin 1s linear infinite}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

    /* Header */
    .app-header{min-height:var(--header-h);padding:12px 20px;padding-top:calc(12px + var(--safe-t));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg);z-index:10}
    .app-header h1{font-family:'Fraunces',serif;font-size:17px;font-weight:900;color:var(--primary);letter-spacing:-0.3px;line-height:1.2}
    .header-right{display:flex;align-items:center;gap:10px}
    .header-date{font-size:12px;color:var(--text-sec);font-weight:500}
    .sign-out-btn{background:none;border:none;color:var(--text-ter);font-size:16px;cursor:pointer;padding:6px;border-radius:50%;transition:color .2s,background .2s;display:flex;align-items:center;justify-content:center}
    .sign-out-btn:hover{color:var(--danger);background:var(--danger-light)}
    .sync-indicator{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--accent);font-weight:600;opacity:0;transition:opacity .3s;white-space:nowrap}
    .sync-indicator.show{opacity:1}
    .sync-indicator.saving{color:var(--text-ter)}
    .sync-indicator i{font-size:10px}

    /* Tabs */
    .tab-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    .tab-pane{display:none;padding:16px;padding-bottom:calc(90px + var(--safe-b));animation:fadeIn .25s ease}
    .tab-pane.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .bottom-nav{display:flex;background:var(--bg-card);border-top:1px solid var(--border);padding-bottom:var(--safe-b);flex-shrink:0;z-index:20}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px 4px;border:none;background:none;color:var(--text-ter);font-size:10px;font-family:inherit;font-weight:600;cursor:pointer;transition:color .2s}
    .nav-item i{font-size:24px}
    .nav-item.active{color:var(--primary)}

    /* ===== CASES TAB ===== */
    .date-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}
    .date-row button{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
    .date-row button:hover{background:var(--primary-light)}
    .date-input{font-family:inherit;font-size:16px;font-weight:600;padding:8px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg-input);color:var(--text);text-align:center;outline:none;width:auto;transition:border-color .2s}
    .date-input:focus{border-color:var(--primary)}
    .today-pill{padding:6px 12px;border-radius:16px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;font-family:inherit;border:none;cursor:pointer;display:none;flex-shrink:0}
    .today-pill.show{display:inline-flex}
    .day-summary{text-align:center;margin-bottom:14px}
    .day-count{font-family:'Fraunces',serif;font-size:36px;font-weight:900;color:var(--primary);line-height:1}
    .day-label{font-size:12px;color:var(--text-sec);margin-top:2px}

    .case-card{background:var(--bg-card);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:6px;box-shadow:var(--shadow);cursor:pointer;border:2px solid transparent;transition:border-color .15s}
    .case-card:active{border-color:var(--primary-light)}
    .case-top{display:flex;align-items:center;gap:8px}
    .type-badge{display:inline-flex;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:.3px;flex-shrink:0}
    .case-num{font-weight:700;font-size:14px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .case-del{background:none;border:none;color:var(--text-ter);font-size:13px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:color .2s,background .2s;flex-shrink:0}
    .case-del:hover{color:var(--danger);background:var(--danger-light)}
    .case-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
    .cat-tag{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600}
    .case-notes{font-size:11px;color:var(--text-ter);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .status-label{font-size:10px;font-weight:700;letter-spacing:.3px;flex-shrink:0}
    .status-chips{display:flex;flex-wrap:wrap;gap:8px}
    .status-chip{padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:var(--bg-card);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
    .status-chip .sdot{width:8px;height:8px;border-radius:50%}
    .status-chip.selected{color:#fff}
    .add-case-btn{width:100%;padding:12px;border:2px dashed var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text-sec);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px;transition:border-color .2s,color .2s}
    .add-case-btn:hover{border-color:var(--primary);color:var(--primary)}
    .add-case-btn i{margin-right:4px}

    .week-section{background:var(--bg-card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-top:16px}
    .week-title{font-size:12px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
    .week-row{display:flex;align-items:center;padding:5px 4px;border-radius:8px;transition:background .2s}
    .week-row.is-selected{background:var(--primary-light)}
    .week-day{width:34px;font-size:11px;font-weight:700;color:var(--text-sec)}
    .week-date{width:28px;font-size:11px;color:var(--text-ter)}
    .week-bar-bg{flex:1;height:20px;background:var(--bg-input);border-radius:5px;overflow:hidden;margin:0 8px}
    .week-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-hover));border-radius:5px;transition:width .5s ease;min-width:0}
    .week-count{width:24px;text-align:right;font-size:12px;font-weight:700;color:var(--text);font-family:'Fraunces',serif}

    /* ===== BROWSE TAB ===== */
    .section-hdr{font-size:12px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
    .filter-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
    .filter-row label{font-size:11px;font-weight:700;color:var(--text-ter);text-transform:uppercase;letter-spacing:.5px}
    .filter-date{font-family:inherit;font-size:14px;padding:7px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-input);color:var(--text);outline:none;flex:1;min-width:0;transition:border-color .2s}
    .filter-date:focus{border-color:var(--primary)}
    .filter-clear{padding:7px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-sec);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
    .filter-clear:hover{border-color:var(--primary);color:var(--primary)}
    .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
    .filter-chip{padding:6px 12px;border-radius:16px;border:1.5px solid var(--border);background:var(--bg-card);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;color:var(--text-sec)}
    .filter-chip.active{color:#fff}
    .result-count{font-size:12px;color:var(--text-ter);margin-bottom:8px}

    .cat-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;margin-top:4px}
    .cat-card{padding:10px 14px;border-radius:var(--radius-sm);background:var(--bg-card);border:2px solid transparent;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);transition:border-color .2s;font-size:13px;font-weight:600}
    .cat-card:hover{border-color:var(--border)}
    .cat-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .cat-card-actions{display:flex;gap:2px;margin-left:auto}
    .cat-card-actions button{background:none;border:none;color:var(--text-ter);font-size:12px;cursor:pointer;padding:3px 5px;border-radius:4px;transition:color .2s}
    .cat-card-actions .edit-cat:hover{color:var(--primary)}
    .cat-card-actions .del-cat:hover{color:var(--danger)}
    .add-cat-chip{padding:10px 14px;border-radius:var(--radius-sm);border:2px dashed var(--border);background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-ter);font-family:inherit;transition:border-color .2s,color .2s}
    .add-cat-chip:hover{border-color:var(--primary);color:var(--primary)}

    /* ===== ANALYTICS TAB ===== */
    .period-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
    .period-btn{padding:7px 13px;border-radius:18px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-sec);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
    .period-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .custom-range{display:none;gap:6px;align-items:center;margin-bottom:14px}
    .custom-range.show{display:flex}
    .custom-range input{flex:1;font-family:inherit;font-size:14px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-input);color:var(--text);outline:none}
    .custom-range span{color:var(--text-ter);font-size:12px}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .stat-card{background:var(--bg-card);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;box-shadow:var(--shadow)}
    .stat-value{font-family:'Fraunces',serif;font-size:26px;font-weight:900;color:var(--primary);line-height:1.1}
    .stat-label{font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:.7px;margin-top:3px;font-weight:600}
    .chart-card{background:var(--bg-card);border-radius:var(--radius);padding:16px 14px;margin-bottom:14px;box-shadow:var(--shadow)}
    .chart-card h3{font-size:13px;font-weight:700;margin-bottom:12px}
    .chart-wrap{position:relative;height:200px}
    .chart-wrap-sm{position:relative;height:160px}
    .weekday-filter{display:flex;gap:6px;margin-bottom:14px}
    .weekday-btn{padding:6px 12px;border-radius:14px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-sec);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
    .weekday-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .data-section{border-top:1px solid var(--border);padding-top:18px;margin-top:8px}
    .data-section h3{font-size:12px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
    .data-btns{display:flex;gap:8px}
    .data-btns button{flex:1;padding:10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
    .data-btns button:hover{border-color:var(--primary);color:var(--primary)}
    .data-btns button i{margin-right:5px}
    .hidden-file{display:none}

    /* ===== MODALS ===== */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.show{opacity:1;pointer-events:auto}
    .modal{background:var(--bg-card);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:var(--safe-b)}
    .modal-overlay.show .modal{transform:translateY(0)}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 0}
    .modal-header h2{font-family:'Fraunces',serif;font-size:18px;font-weight:700}
    .modal-close{background:none;border:none;color:var(--text-sec);font-size:16px;cursor:pointer;padding:6px;border-radius:50%}
    .modal-body{padding:16px 18px}
    .modal-footer{padding:0 18px 18px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:11px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
    .form-input{font-family:inherit;font-size:16px;padding:10px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg-input);color:var(--text);width:100%;outline:none;transition:border-color .2s}
    .form-input:focus{border-color:var(--primary)}
    textarea.form-input{resize:vertical;min-height:60px}
    .type-chips{display:flex;flex-wrap:wrap;gap:8px}
    .type-chip{padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:var(--bg-card);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
    .type-chip.selected{color:#fff}
    .cat-select-row{display:flex;flex-wrap:wrap;gap:6px}
    .cat-sel-chip{padding:6px 12px;border-radius:16px;border:1.5px solid var(--border);background:var(--bg-card);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
    .cat-sel-chip .check{display:none;font-size:10px}
    .cat-sel-chip.selected .check{display:inline}
    .cat-sel-chip.selected{color:#fff}
    .new-cat-row{display:flex;gap:6px;margin-top:8px}
    .new-cat-row input{flex:1;font-family:inherit;font-size:14px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-input);color:var(--text);outline:none}
    .new-cat-row button{padding:8px 14px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
    .color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
    .color-swatch{width:100%;aspect-ratio:1;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
    .color-swatch:hover{transform:scale(1.12)}
    .color-swatch.selected{border-color:var(--text);transform:scale(1.12)}
    .btn{width:100%;padding:12px;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .2s,transform .1s}
    .btn:active{transform:scale(0.98)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-ghost{background:var(--bg-input);color:var(--text-sec)}
    .btn-danger{background:var(--danger);color:#fff}
    .confirm-body{padding:20px 18px 6px}
    .confirm-body p{font-size:14px;line-height:1.5}
    .confirm-footer{display:flex;gap:8px;padding:14px 18px 18px}
    .confirm-footer .btn{flex:1}

    /* Misc */
    .empty-state{text-align:center;padding:40px 16px;color:var(--text-ter)}
    .empty-state i{font-size:36px;margin-bottom:10px;display:block}
    .empty-state p{font-size:13px;line-height:1.5}
    .toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 20px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--bg);padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .storage-warn{background:var(--danger-light);color:var(--danger);padding:8px 14px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:12px;line-height:1.4}
    .storage-warn i{margin-right:5px}
    .tab-content::-webkit-scrollbar{width:0}
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-logo">Jeff's Dietetic<br>Case Record</div>
    <div class="login-sub">Sign in to access your data</div>
    <button class="google-btn" id="googleSignInBtn">

<script>
/* ===== DARK MODE ===== */
if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.classList.add('dark');
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',e=>{e.matches?document.documentElement.classList.add('dark'):document.documentElement.classList.remove('dark');});

/* ===== CONSTANTS ===== */
const CAT_COLORS=['#e05252','#e07840','#e0a830','#68b845','#2daa6e','#30a8c0','#4878d0','#7050d0','#a848c0','#d050a0','#78909c','#8d6e63'];
const CASE_TYPES=[
  {key:'O',color:'#4878d0',bg:'rgba(72,120,208,0.12)'},
  {key:'T',color:'#2daa6e',bg:'rgba(45,170,110,0.12)'},
  {key:'O+T',color:'#7050d0',bg:'rgba(112,80,208,0.12)'},
  {key:'TPN',color:'#e07840',bg:'rgba(224,120,64,0.12)'},
  {key:'Education',color:'#30a8c0',bg:'rgba(48,168,192,0.12)'}
];
const CASE_STATUSES=[
  {key:'Active',color:'#2daa6e',bg:'rgba(45,170,110,0.12)'},
  {key:'PRN',color:'#e0a830',bg:'rgba(224,168,48,0.12)'},
  {key:'Discharged',color:'#e05252',bg:'rgba(224,82,82,0.12)'}
];
function statusInfo(k){return CASE_STATUSES.find(s=>s.key===k)||CASE_STATUSES[0];}
const WEEKDAY_OPTIONS=[{key:'mon-fri',label:'Mon–Fri'},{key:'mon-sat',label:'Mon–Sat'},{key:'all',label:'All Days'}];
const PERIODS=[{key:'week',label:'This Week'},{key:'month',label:'This Month'},{key:'30days',label:'Last 30d'},{key:'year',label:'This Year'},{key:'custom',label:'Custom'}];
const DAY_NAMES=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const ALLOWED_EMAIL='tmh.jeffreychan@gmail.com';
function typeInfo(k){return CASE_TYPES.find(t=>t.key===k)||{key:k,color:'#78909c',bg:'rgba(120,144,156,0.12)'};}

/* ===== FIREBASE ===== */
let firestore=null,auth=null,usingMemory=false;
const mem={cases:[],categories:[],nextId:1};
const firebaseConfig={apiKey:"AIzaSyDXx-Scqt_y8swNOqqIEq-MwInE0gMxfx8",authDomain:"tmh-case.firebaseapp.com",projectId:"tmh-case",storageBucket:"tmh-case.firebasestorage.app",messagingSenderId:"461118243183",appId:"1:461118243183:web:eb65e167783233c344e89a"};
try{firebase.initializeApp(firebaseConfig);firestore=firebase.firestore();auth=firebase.auth();}catch(_e){usingMemory=true;}
/* If Firebase SDK failed to load (CSP blocks gstatic.com in Poe), skip auth */
if(typeof firebase==='undefined'||!firestore){usingMemory=true;firestore=null;auth=null;}

/* ===== AUTH ===== */
function showLoginError(m){const e=document.getElementById('loginError');e.textContent=m;e.classList.add('show');}
function hideLoginError(){document.getElementById('loginError').classList.remove('show');}
function showLoginLoading(s){document.getElementById('loginLoading').classList.toggle('show',s);document.getElementById('googleSignInBtn').style.display=s?'none':'';}
async function signInWithGoogle(){
  if(!auth){showLoginError('Firebase not available.');return;}
  hideLoginError();showLoginLoading(true);
  try{const p=new firebase.auth.GoogleAuthProvider();p.setCustomParameters({prompt:'select_account'});const r=await auth.signInWithPopup(p);if(r.user.email.toLowerCase()!==ALLOWED_EMAIL.toLowerCase()){await auth.signOut();showLoginLoading(false);showLoginError('Access denied. Only '+ALLOWED_EMAIL+' can use this app. You signed in as '+r.user.email);return;}}
  catch(err){showLoginLoading(false);if(err.code==='auth/popup-closed-by-user')return;if(err.code==='auth/popup-blocked'){try{const p=new firebase.auth.GoogleAuthProvider();p.setCustomParameters({prompt:'select_account'});await auth.signInWithRedirect(p);}catch(_e){showLoginError('Sign-in failed. Allow popups.');}return;}showLoginError('Sign-in failed: '+(err.message||'Unknown'));}
}
async function signOutUser(){if(auth)await auth.signOut();document.getElementById('app').style.display='none';document.getElementById('loginScreen').classList.remove('hidden');showLoginLoading(false);hideLoginError();}
/* Skip login for preview — set SKIP_LOGIN=false to re-enable auth */
const SKIP_LOGIN=true;
if(!SKIP_LOGIN&&auth&&!usingMemory){auth.onAuthStateChanged(async u=>{if(u&&u.email.toLowerCase()===ALLOWED_EMAIL.toLowerCase()){document.getElementById('loginScreen').classList.add('hidden');document.getElementById('app').style.display='';await initApp();}else if(u){await auth.signOut();showLoginLoading(false);showLoginError('Access denied. Only '+ALLOWED_EMAIL+'.');}else{document.getElementById('app').style.display='none';document.getElementById('loginScreen').classList.remove('hidden');showLoginLoading(false);}});}
else{document.getElementById('loginScreen').classList.add('hidden');document.getElementById('app').style.display='';usingMemory=true;initApp();}
document.getElementById('googleSignInBtn').addEventListener('click',signInWithGoogle);
document.getElementById('signOutBtn').addEventListener('click',signOutUser);

/* ===== DATABASE ===== */
async function addCase(c){showSyncStatus('saving');if(usingMemory){c.id=String(mem.nextId++);mem.cases.push(c);showSyncStatus('saved');return c.id;}const r=await firestore.collection('cases').add(c);showSyncStatus('saved');return r.id;}
async function updateCase(id,data){showSyncStatus('saving');if(usingMemory){const i=mem.cases.findIndex(c=>c.id===id);if(i>=0)Object.assign(mem.cases[i],data);showSyncStatus('saved');return;}await firestore.collection('cases').doc(id).update(data);showSyncStatus('saved');}
async function deleteCase(id){showSyncStatus('saving');if(usingMemory){mem.cases=mem.cases.filter(c=>c.id!==id);showSyncStatus('saved');return;}await firestore.collection('cases').doc(id).delete();showSyncStatus('saved');}
async function getCasesByDate(date){if(usingMemory)return mem.cases.filter(c=>c.date===date).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));const s=await firestore.collection('cases').where('date','==',date).get();return s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));}
async function getCasesRange(start,end){if(usingMemory)return mem.cases.filter(c=>c.date>=start&&c.date<=end);const s=await firestore.collection('cases').where('date','>=',start).where('date','<=',end).get();return s.docs.map(d=>({id:d.id,...d.data()}));}
async function getAllCases(){if(usingMemory)return[...mem.cases];const s=await firestore.collection('cases').get();return s.docs.map(d=>({id:d.id,...d.data()}));}
async function getCategories(){if(usingMemory)return[...mem.categories];const s=await firestore.collection('categories').orderBy('name').get();return s.docs.map(d=>({id:d.id,...d.data()}));}
async function addCategory(cat){showSyncStatus('saving');if(usingMemory){cat.id=String(mem.nextId++);mem.categories.push(cat);showSyncStatus('saved');return cat.id;}const r=await firestore.collection('categories').add({name:cat.name,color:cat.color});showSyncStatus('saved');return r.id;}
async function updateCategoryDB(cat){showSyncStatus('saving');if(usingMemory){const i=mem.categories.findIndex(c=>c.id===cat.id);if(i>=0)mem.categories[i]=cat;showSyncStatus('saved');return;}await firestore.collection('categories').doc(cat.id).set({name:cat.name,color:cat.color});showSyncStatus('saved');}
async function deleteCategoryDB(id){showSyncStatus('saving');if(usingMemory){mem.categories=mem.categories.filter(c=>c.id!==id);showSyncStatus('saved');return;}await firestore.collection('categories').doc(id).delete();showSyncStatus('saved');}
async function clearAllData(){if(usingMemory){mem.cases=[];mem.categories=[];return;}for(const col of['cases','categories']){const s=await firestore.collection(col).get();for(const d of s.docs)await d.ref.delete();}}

/* ===== STATE ===== */
let categories=[],currentTab='cases',caseDate=todayStr(),selectedPeriod='week';
let editingCaseId=null,selectedType=null,selectedStatus='Active',selectedCats=new Set();
let editingCatId=null,selectedCatColor=CAT_COLORS[0];
let bFilterFrom='',bFilterTo='',bFilterTypes=new Set(),bFilterCats=new Set();
let dailyChartInst=null,typeChartInst=null,catChartInst=null,confirmResolve=null,appInitialized=false,selectedWeekday='mon-fri';

/* ===== HELPERS ===== */
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function fmtShort(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function addDays(d,n){const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}
function getWeekStart(d){const dow=new Date(d+'T12:00:00').getDay();return addDays(d,-(dow===0?6:dow-1));}
function daysBetween(s,e){const a=[];let c=s;while(c<=e){a.push(c);c=addDays(c,1);}return a;}
function getRange(p){const t=todayStr();switch(p){case'week':return{start:getWeekStart(t),end:addDays(getWeekStart(t),6)};case'month':return{start:t.slice(0,8)+'01',end:t};case'30days':return{start:addDays(t,-29),end:t};case'year':return{start:t.slice(0,5)+'01-01',end:t};default:return{start:t,end:t};}}

/* ===== UTILS ===== */
function $(id){return document.getElementById(id);}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function showToast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
let syncTimer=null;
function showSyncStatus(status){const el=$('syncIndicator'),txt=$('syncText');if(!el||!txt)return;el.classList.remove('saving');if(status==='saving'){txt.textContent='Saving...';el.querySelector('i').className='fas fa-cloud-upload-alt';el.classList.add('saving');}else{txt.textContent='Saved';el.querySelector('i').className='fas fa-cloud';}el.classList.add('show');clearTimeout(syncTimer);if(status==='saved')syncTimer=setTimeout(()=>el.classList.remove('show'),2500);}
function showModal(id){$(id).classList.add('show');}
function hideModal(id){$(id).classList.remove('show');}
function showConfirm(msg){return new Promise(resolve=>{$('confirmMsg').textContent=msg;showModal('confirmModal');confirmResolve=resolve;});}
function catByName(name){return categories.find(c=>c.name===name);}

/* ================================================================
   TAB 1: CASES (Daily Log)
   ================================================================ */
async function renderCases(){
  const cases=await getCasesByDate(caseDate);
  const isToday=caseDate===todayStr();
  $('cToday').classList.toggle('show',!isToday);
  $('dayCount').textContent=cases.length;
  $('dayLabel').textContent=cases.length===1?'case':'cases';

  if(cases.length===0){
    $('caseList').innerHTML='<div class="empty-state" style="padding:20px 0"><i class="fas fa-clipboard"></i><p>No cases logged'+(isToday?' today':'')+'.<br>Tap + to add one.</p></div>';
  }else{
    $('caseList').innerHTML=cases.map(c=>{
      const ti=typeInfo(c.type);const si=statusInfo(c.status);
      const catTags=(c.categories||[]).map(cn=>{const ci=catByName(cn);const col=ci?ci.color:'#78909c';return`<span class="cat-tag" style="background:${col}20;color:${col}">${escHtml(cn)}</span>`;}).join('');
      return`<div class="case-card" data-id="${c.id}" style="border-left:4px solid ${si.color}">
        <div class="case-top">
          <span class="type-badge" style="background:${ti.bg};color:${ti.color}">${escHtml(c.type)}</span>
          <span class="case-num">${escHtml(c.caseNum||'(no ref)')}</span>
          <span class="status-label" style="color:${si.color}">${escHtml(c.status||'Active')}</span>
          <button class="case-del" data-id="${c.id}" title="Delete"><i class="fas fa-trash-alt"></i></button>
        </div>
        ${catTags?'<div class="case-tags">'+catTags+'</div>':''}
        ${c.notes?'<div class="case-notes">'+escHtml(c.notes)+'</div>':''}
      </div>`;
    }).join('');
    // Bind events
    $('caseList').querySelectorAll('.case-card').forEach(card=>{
      card.addEventListener('click',e=>{if(e.target.closest('.case-del'))return;openEditCase(card.dataset.id,cases);});
    });
    $('caseList').querySelectorAll('.case-del').forEach(btn=>{
      btn.addEventListener('click',async e=>{e.stopPropagation();const ok=await showConfirm('Delete this case?');if(!ok)return;await deleteCase(btn.dataset.id);showToast('Case deleted');renderCases();});
    });
  }
  await renderWeekSummary();
}

async function renderWeekSummary(){
  const ws=getWeekStart(caseDate);
  const days=[];for(let i=0;i<7;i++)days.push(addDays(ws,i));
  const cases=await getCasesRange(ws,addDays(ws,6));
  const countMap={};cases.forEach(c=>{countMap[c.date]=(countMap[c.date]||0)+1;});
  const maxC=Math.max(1,...Object.values(countMap));
  const t=todayStr();
  $('weekTitle').textContent=ws===getWeekStart(t)?'This Week':'Week of '+fmtShort(ws);
  $('weekRows').innerHTML=days.map((d,i)=>{
    const cnt=countMap[d]||0;const pct=maxC>0?(cnt/maxC*100):0;
    return`<div class="week-row ${d===caseDate?'is-selected':''}"><span class="week-day">${DAY_NAMES[i]}</span><span class="week-date">${d.split('-')[2]}</span><div class="week-bar-bg"><div class="week-bar" style="width:${pct}%"></div></div><span class="week-count">${cnt||'\u2013'}</span></div>`;
  }).join('');
}

/* ===== CASE MODAL ===== */
function openNewCase(){
  editingCaseId=null;selectedType=null;selectedStatus='Active';selectedCats=new Set();
  $('caseModalTitle').textContent='New Case';
  $('mCaseNum').value='';$('mCaseDate').value=caseDate;$('mCaseNotes').value='';
  renderModalTypeChips();renderModalStatusChips();renderModalCatChips();
  showModal('caseModal');setTimeout(()=>$('mCaseNum').focus(),300);
}
function openEditCase(id,cases){
  const c=cases.find(x=>x.id===id);if(!c)return;
  editingCaseId=id;selectedType=c.type;selectedStatus=c.status||'Active';selectedCats=new Set(c.categories||[]);
  $('caseModalTitle').textContent='Edit Case';
  $('mCaseNum').value=c.caseNum||'';$('mCaseDate').value=c.date;$('mCaseNotes').value=c.notes||'';
  renderModalTypeChips();renderModalStatusChips();renderModalCatChips();showModal('caseModal');
}
function renderModalTypeChips(){
  $('mTypeChips').innerHTML=CASE_TYPES.map(t=>`<div class="type-chip ${selectedType===t.key?'selected':''}" data-type="${t.key}" style="${selectedType===t.key?'background:'+t.color+';border-color:'+t.color+';color:#fff':''}"> ${t.key}</div>`).join('');
  $('mTypeChips').querySelectorAll('.type-chip').forEach(ch=>{ch.addEventListener('click',()=>{selectedType=ch.dataset.type;renderModalTypeChips();});});
}
function renderModalStatusChips(){
  $('mStatusChips').innerHTML=CASE_STATUSES.map(s=>{
    const sel=selectedStatus===s.key;
    return`<div class="status-chip ${sel?'selected':''}" data-status="${s.key}" style="${sel?'background:'+s.color+';border-color:'+s.color+';color:#fff':''}"><span class="sdot" style="background:${sel?'#fff':s.color}"></span>${s.key}</div>`;
  }).join('');
  $('mStatusChips').querySelectorAll('.status-chip').forEach(ch=>{ch.addEventListener('click',()=>{selectedStatus=ch.dataset.status;renderModalStatusChips();});});
}
function renderModalCatChips(){
  let html=categories.map(c=>{
    const sel=selectedCats.has(c.name);
    return`<div class="cat-sel-chip ${sel?'selected':''}" data-name="${escHtml(c.name)}" style="${sel?'background:'+c.color+';border-color:'+c.color+';color:#fff':''}"><span class="check"><i class="fas fa-check"></i></span>${escHtml(c.name)}</div>`;
  }).join('');
  html+='<div class="cat-sel-chip" id="newCatChip" style="border-style:dashed;color:var(--text-ter)"><i class="fas fa-plus" style="font-size:10px"></i> New</div>';
  $('mCatChips').innerHTML=html;
  $('mCatChips').querySelectorAll('.cat-sel-chip[data-name]').forEach(ch=>{
    ch.addEventListener('click',()=>{const n=ch.dataset.name;if(selectedCats.has(n))selectedCats.delete(n);else selectedCats.add(n);renderModalCatChips();});
  });
  const newChip=$('newCatChip');
  if(newChip)newChip.addEventListener('click',()=>{$('newCatRow').style.display='flex';$('newCatInput').focus();});
}
async function saveNewCatInline(){
  const name=$('newCatInput').value.trim();if(!name){showToast('Enter a name');return;}
  const dup=categories.find(c=>c.name.toLowerCase()===name.toLowerCase());
  if(dup){selectedCats.add(dup.name);$('newCatInput').value='';$('newCatRow').style.display='none';renderModalCatChips();return;}
  const color=CAT_COLORS[categories.length%CAT_COLORS.length];
  await addCategory({name,color});categories=await getCategories();
  selectedCats.add(name);$('newCatInput').value='';$('newCatRow').style.display='none';
  renderModalCatChips();showToast('Category created');
}
async function saveCaseFromModal(){
  const caseNum=$('mCaseNum').value.trim();
  const date=$('mCaseDate').value||todayStr();
  const notes=$('mCaseNotes').value.trim();
  if(!selectedType){showToast('Please select a case type');return;}
  const data={caseNum,date,type:selectedType,status:selectedStatus,categories:[...selectedCats],notes,createdAt:new Date().toISOString()};
  if(editingCaseId){await updateCase(editingCaseId,data);}else{await addCase(data);}
  hideModal('caseModal');showToast(editingCaseId?'Case updated':'Case saved');
  if(currentTab==='cases')renderCases();else if(currentTab==='browse')renderBrowse();
}

/* ================================================================
   TAB 2: BROWSE
   ================================================================ */
async function renderBrowse(){
  categories=await getCategories();
  // Type filter chips
  $('typeFilterChips').innerHTML=CASE_TYPES.map(t=>{
    const active=bFilterTypes.has(t.key);
    return`<div class="filter-chip ${active?'active':''}" data-type="${t.key}" style="${active?'background:'+t.color+';border-color:'+t.color:''}"> ${t.key}</div>`;
  }).join('');
  $('typeFilterChips').querySelectorAll('.filter-chip').forEach(ch=>{
    ch.addEventListener('click',()=>{const k=ch.dataset.type;if(bFilterTypes.has(k))bFilterTypes.delete(k);else bFilterTypes.add(k);renderBrowse();});
  });
  // Cat filter chips
  $('catFilterChips').innerHTML=categories.map(c=>{
    const active=bFilterCats.has(c.name);
    return`<div class="filter-chip ${active?'active':''}" data-cat="${escHtml(c.name)}" style="${active?'background:'+c.color+';border-color:'+c.color:''}"> ${escHtml(c.name)}</div>`;
  }).join('');
  $('catFilterChips').querySelectorAll('.filter-chip').forEach(ch=>{
    ch.addEventListener('click',()=>{const k=ch.dataset.cat;if(bFilterCats.has(k))bFilterCats.delete(k);else bFilterCats.add(k);renderBrowse();});
  });
  // Fetch and filter
  let cases;
  if(bFilterFrom||bFilterTo){cases=await getCasesRange(bFilterFrom||'2000-01-01',bFilterTo||'2099-12-31');}else{cases=await getAllCases();}
  if(bFilterTypes.size>0)cases=cases.filter(c=>bFilterTypes.has(c.type));
  if(bFilterCats.size>0)cases=cases.filter(c=>(c.categories||[]).some(cn=>bFilterCats.has(cn)));
  cases.sort((a,b)=>b.date.localeCompare(a.date)||(b.createdAt||'').localeCompare(a.createdAt||''));
  $('browseCount').textContent=cases.length+' case'+(cases.length!==1?'s':'');
  if(cases.length===0){
    $('browseList').innerHTML='<div class="empty-state" style="padding:20px 0"><i class="fas fa-search"></i><p>No cases found.</p></div>';
  }else{
    $('browseList').innerHTML=cases.map(c=>{
      const ti=typeInfo(c.type);const si=statusInfo(c.status);
      const catTags=(c.categories||[]).map(cn=>{const ci=catByName(cn);const col=ci?ci.color:'#78909c';return`<span class="cat-tag" style="background:${col}20;color:${col}">${escHtml(cn)}</span>`;}).join('');
      return`<div class="case-card" data-id="${c.id}" style="border-left:4px solid ${si.color}">
        <div class="case-top"><span class="type-badge" style="background:${ti.bg};color:${ti.color}">${escHtml(c.type)}</span><span class="case-num">${escHtml(c.caseNum||'(no ref)')}</span><span class="status-label" style="color:${si.color}">${escHtml(c.status||'Active')}</span><span style="font-size:11px;color:var(--text-ter);flex-shrink:0">${fmtShort(c.date)}</span></div>
        ${catTags?'<div class="case-tags">'+catTags+'</div>':''}
        ${c.notes?'<div class="case-notes">'+escHtml(c.notes)+'</div>':''}
      </div>`;
    }).join('');
  }
  // Category management
  let catHtml='';
  for(const c of categories){
    catHtml+=`<div class="cat-card"><span class="cat-card-dot" style="background:${c.color}"></span>${escHtml(c.name)}<div class="cat-card-actions"><button class="edit-cat" data-id="${c.id}"><i class="fas fa-pen"></i></button><button class="del-cat" data-id="${c.id}" data-name="${escHtml(c.name)}"><i class="fas fa-trash-alt"></i></button></div></div>`;
  }
  catHtml+='<button class="add-cat-chip" id="addCatChipBrowse"><i class="fas fa-plus"></i> Add</button>';
  $('catGrid').innerHTML=catHtml;
  $('catGrid').querySelectorAll('.edit-cat').forEach(b=>{b.addEventListener('click',()=>{const c=categories.find(x=>x.id===b.dataset.id);if(c)openEditCategory(c);});});
  $('catGrid').querySelectorAll('.del-cat').forEach(b=>{b.addEventListener('click',()=>deleteCategoryPrompt(b.dataset.id,b.dataset.name));});
  const addBtn=$('addCatChipBrowse');if(addBtn)addBtn.addEventListener('click',openAddCategory);
}

/* ===== CATEGORY MODAL ===== */
function openAddCategory(){editingCatId=null;$('catModalTitle').textContent='Add Category';$('catNameInput').value='';selectedCatColor=CAT_COLORS[0];renderColorGrid();showModal('catModal');setTimeout(()=>$('catNameInput').focus(),300);}
function openEditCategory(cat){editingCatId=cat.id;$('catModalTitle').textContent='Edit Category';$('catNameInput').value=cat.name;selectedCatColor=cat.color;renderColorGrid();showModal('catModal');}
function renderColorGrid(){const g=$('colorGrid');g.innerHTML=CAT_COLORS.map(c=>`<div class="color-swatch ${c===selectedCatColor?'selected':''}" style="background:${c}" data-color="${c}"></div>`).join('');g.querySelectorAll('.color-swatch').forEach(s=>{s.addEventListener('click',()=>{selectedCatColor=s.dataset.color;renderColorGrid();});});}
async function saveCategory(){
  const name=$('catNameInput').value.trim();if(!name){showToast('Enter a name');return;}
  const dup=categories.find(c=>c.name.toLowerCase()===name.toLowerCase()&&c.id!==editingCatId);if(dup){showToast('Already exists');return;}
  if(editingCatId){
    const old=categories.find(c=>c.id===editingCatId);
    if(old&&old.name!==name){
      const all=await getAllCases();
      for(const c of all.filter(x=>(x.categories||[]).includes(old.name))){
        const newCats=c.categories.map(cn=>cn===old.name?name:cn);
        if(!usingMemory)await firestore.collection('cases').doc(c.id).update({categories:newCats});
        else{const i=mem.cases.findIndex(x=>x.id===c.id);if(i>=0)mem.cases[i].categories=newCats;}
      }
    }
    await updateCategoryDB({id:editingCatId,name,color:selectedCatColor});
  }else{await addCategory({name,color:selectedCatColor});}
  hideModal('catModal');categories=await getCategories();showToast(editingCatId?'Updated':'Created');
  if(currentTab==='browse')renderBrowse();
}
async function deleteCategoryPrompt(id,name){
  const ok=await showConfirm('Delete category "'+name+'"? It will be removed from all cases.');
  if(!ok)return;
  const all=await getAllCases();
  for(const c of all.filter(x=>(x.categories||[]).includes(name))){
    const newCats=c.categories.filter(cn=>cn!==name);
    if(!usingMemory)await firestore.collection('cases').doc(c.id).update({categories:newCats});
    else{const i=mem.cases.findIndex(x=>x.id===c.id);if(i>=0)mem.cases[i].categories=newCats;}
  }
  await deleteCategoryDB(id);categories=await getCategories();showToast('Deleted');renderBrowse();
}

/* ================================================================
   TAB 3: ANALYTICS
   ================================================================ */
function isWeekdayIncluded(dateStr){
  const dow=new Date(dateStr+'T12:00:00').getDay(); // 0=Sun,6=Sat
  if(selectedWeekday==='mon-fri')return dow>=1&&dow<=5;
  if(selectedWeekday==='mon-sat')return dow>=1&&dow<=6;
  return true;
}
function renderWeekdayFilter(){
  $('weekdayFilter').innerHTML=WEEKDAY_OPTIONS.map(o=>`<button class="weekday-btn ${o.key===selectedWeekday?'active':''}" data-wk="${o.key}">${o.label}</button>`).join('');
}
async function renderAnalytics(){
  renderWeekdayFilter();
  let range;
  if(selectedPeriod==='custom'){range={start:$('anStart').value||todayStr(),end:$('anEnd').value||todayStr()};}
  else{range=getRange(selectedPeriod);}
  const allCases=await getCasesRange(range.start,range.end);
  const cases=allCases.filter(c=>isWeekdayIncluded(c.date));
  const allDays=daysBetween(range.start,range.end);
  const days=allDays.filter(d=>isWeekdayIncluded(d));
  const total=cases.length;
  const avg=days.length>0?(total/days.length).toFixed(1):'0';
  // Peak day
  const dayMap={};cases.forEach(c=>{dayMap[c.date]=(dayMap[c.date]||0)+1;});
  let peakMax=0,peakDay='-';
  Object.entries(dayMap).forEach(([d,n])=>{if(n>peakMax){peakMax=n;peakDay=fmtShort(d);}});
  $('statsGrid').innerHTML=`<div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total</div></div><div class="stat-card"><div class="stat-value">${avg}</div><div class="stat-label">Daily Avg</div></div><div class="stat-card"><div class="stat-value">${peakMax||0}</div><div class="stat-label">Peak (${peakDay})</div></div>`;

  // Type chart
  const typeCounts={};CASE_TYPES.forEach(t=>{typeCounts[t.key]=0;});
  cases.forEach(c=>{if(typeCounts[c.type]!==undefined)typeCounts[c.type]++;else typeCounts[c.type]=(typeCounts[c.type]||0)+1;});
  renderTypeChart(typeCounts);

  // Category chart
  const catCounts={};
  cases.forEach(c=>{(c.categories||[]).forEach(cn=>{catCounts[cn]=(catCounts[cn]||0)+1;});});
  renderCatChart(catCounts);

  // Daily trend (only included weekdays)
  const dailyData=days.map(d=>dayMap[d]||0);
  renderDailyChart(days.map(d=>fmtShort(d)),dailyData);
}

function chartColors(){const dk=document.documentElement.classList.contains('dark');return{text:dk?'#908880':'#7a6f65',grid:dk?'#28283a':'#e0d8ce',primary:dk?'#d48548':'#b85c2f',bg:dk?'rgba(212,133,72,0.25)':'rgba(184,92,47,0.18)'};}

function renderTypeChart(counts){
  const labels=Object.keys(counts);const data=Object.values(counts);
  const colors=labels.map(k=>typeInfo(k).color);
  if(typeChartInst)typeChartInst.destroy();
  typeChartInst=new Chart($('typeChart'),{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:chartColors().text,font:{family:"'DM Sans'",size:11},boxWidth:12,padding:8}}}}});
}
function renderCatChart(counts){
  const cc=chartColors();
  const labels=Object.keys(counts);const data=Object.values(counts);
  const colors=labels.map(n=>{const c=catByName(n);return c?c.color:'#78909c';});
  if(catChartInst)catChartInst.destroy();
  if(labels.length===0){$('catChart').parentElement.querySelector('canvas').style.display='none';return;}
  $('catChart').style.display='';
  catChartInst=new Chart($('catChart'),{type:'bar',data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:5,maxBarThickness:28}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1,color:cc.text,font:{family:"'DM Sans'"}},grid:{color:cc.grid}},y:{grid:{display:false},ticks:{color:cc.text,font:{family:"'DM Sans'",size:11}}}}}});
}
function renderDailyChart(labels,data){
  const c=chartColors();
  if(dailyChartInst)dailyChartInst.destroy();
  dailyChartInst=new Chart($('dailyChart'),{type:'bar',data:{labels,datasets:[{data,backgroundColor:c.bg,borderColor:c.primary,borderWidth:2,borderRadius:5,maxBarThickness:28}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,color:c.text,font:{family:"'DM Sans'"}},grid:{color:c.grid}},x:{grid:{display:false},ticks:{color:c.text,maxTicksLimit:8,maxRotation:0,font:{size:10,family:"'DM Sans'"}}}}}});
}
function renderPeriodSelector(){$('periodSel').innerHTML=PERIODS.map(p=>`<button class="period-btn ${p.key===selectedPeriod?'active':''}" data-period="${p.key}">${p.label}</button>`).join('');}

/* ===== NAVIGATION ===== */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  $('tab-'+tab).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.tab===tab));
  if(tab==='cases')renderCases();else if(tab==='browse')renderBrowse();else if(tab==='analytics')renderAnalytics();
}

/* ===== EXPORT / IMPORT ===== */
async function exportData(){
  const payload={version:3,exportDate:new Date().toISOString(),cases:await getAllCases(),categories:await getCategories()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='caselog-'+todayStr()+'.json';a.click();URL.revokeObjectURL(url);showToast('Exported');
}
async function importData(file){
  try{const data=JSON.parse(await file.text());
    if(!data.cases&&!data.categories){showToast('Invalid file');return;}
    const ok=await showConfirm('Replace all current data with imported data?');if(!ok)return;
    await clearAllData();
    if(data.categories)for(const c of data.categories)await addCategory({name:c.name,color:c.color});
    if(data.cases)for(const c of data.cases)await addCase({caseNum:c.caseNum,date:c.date,type:c.type,status:c.status||'Active',categories:c.categories||[],notes:c.notes||'',createdAt:c.createdAt});
    categories=await getCategories();showToast('Imported');switchTab(currentTab);
  }catch(_e){showToast('Import failed');}
}

/* ===== EVENT LISTENERS ===== */
document.querySelectorAll('.nav-item').forEach(btn=>{btn.addEventListener('click',()=>switchTab(btn.dataset.tab));});
$('cPrev').addEventListener('click',()=>{caseDate=addDays(caseDate,-1);$('cDate').value=caseDate;renderCases();});
$('cNext').addEventListener('click',()=>{caseDate=addDays(caseDate,1);$('cDate').value=caseDate;renderCases();});
$('cDate').addEventListener('change',()=>{caseDate=$('cDate').value||todayStr();renderCases();});
$('cToday').addEventListener('click',()=>{caseDate=todayStr();$('cDate').value=caseDate;renderCases();});
$('addCaseBtn').addEventListener('click',openNewCase);
$('saveCaseBtn').addEventListener('click',saveCaseFromModal);
$('saveCatBtn').addEventListener('click',saveCategory);
$('newCatSave').addEventListener('click',saveNewCatInline);
$('newCatInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveNewCatInline();});
$('bFrom').addEventListener('change',e=>{bFilterFrom=e.target.value;renderBrowse();});
$('bTo').addEventListener('change',e=>{bFilterTo=e.target.value;renderBrowse();});
$('bClear').addEventListener('click',()=>{bFilterFrom='';bFilterTo='';$('bFrom').value='';$('bTo').value='';bFilterTypes.clear();bFilterCats.clear();renderBrowse();});
$('periodSel').addEventListener('click',e=>{const btn=e.target.closest('.period-btn');if(!btn)return;selectedPeriod=btn.dataset.period;renderPeriodSelector();if(selectedPeriod==='custom')$('customRange').classList.add('show');else{$('customRange').classList.remove('show');renderAnalytics();}});
$('anStart').addEventListener('change',()=>{if(selectedPeriod==='custom')renderAnalytics();});
$('anEnd').addEventListener('change',()=>{if(selectedPeriod==='custom')renderAnalytics();});
$('weekdayFilter').addEventListener('click',e=>{const btn=e.target.closest('.weekday-btn');if(!btn)return;selectedWeekday=btn.dataset.wk;renderAnalytics();});
document.querySelectorAll('.modal-close').forEach(btn=>{btn.addEventListener('click',()=>{hideModal(btn.dataset.modal);$('newCatRow').style.display='none';});});
document.querySelectorAll('.modal-overlay').forEach(ov=>{ov.addEventListener('click',e=>{if(e.target===ov){hideModal(ov.id);$('newCatRow').style.display='none';}});});
$('confirmYes').addEventListener('click',()=>{hideModal('confirmModal');if(confirmResolve)confirmResolve(true);});
$('confirmNo').addEventListener('click',()=>{hideModal('confirmModal');if(confirmResolve)confirmResolve(false);});
$('exportBtn').addEventListener('click',exportData);
$('importBtn').addEventListener('click',()=>$('importFile').click());
$('importFile').addEventListener('change',e=>{if(e.target.files[0])importData(e.target.files[0]);e.target.value='';});

/* ===== INIT ===== */
async function initApp(){
  if(appInitialized)return;appInitialized=true;
  $('headerDate').textContent=fmtDate(todayStr());
  $('cDate').value=caseDate;
  const r=getRange('week');$('anStart').value=r.start;$('anEnd').value=r.end;
  renderPeriodSelector();
  if(firestore){try{await firestore.enablePersistence();}catch(_e){}}
  if(!firestore){usingMemory=true;$('storageWarn').innerHTML='<div class="storage-warn"><i class="fas fa-exclamation-triangle"></i> Firebase unavailable. Data will be lost on refresh.</div>';}
  try{categories=await getCategories();}catch(_e){categories=[];}
  renderCases();
}
</script>
